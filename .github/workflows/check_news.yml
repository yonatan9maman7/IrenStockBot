name: Check IREN News

on:
  schedule:
    # 10:00 UTC = 13:00 Israel Summer Time (IDT, UTC+3)
    - cron: "0 10 * * *"
    # 19:30 UTC = 22:30 Israel Summer Time (IDT, UTC+3)
    - cron: "30 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run IrenStockBot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: dotnet run --project .

      - name: Commit and push last_id.txt if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f last_id.txt ]; then
            git add last_id.txt
            git diff --cached --quiet || (git commit -m "Update last_id.txt" && git push)
          else
            echo "last_id.txt not found, nothing to commit."
          fi
